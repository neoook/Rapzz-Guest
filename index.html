<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💎 ELITE RARE FINDER v2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #f8fafc; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .rare-glow { border: 1px solid rgba(245, 158, 11, 0.3); box-shadow: 0 0 25px rgba(245, 158, 11, 0.1); background: linear-gradient(145deg, rgba(245, 158, 11, 0.05) 0%, rgba(2, 6, 23, 1) 100%); }
        .badge-rare { background: linear-gradient(90deg, #f59e0b, #ef4444); color: white; text-shadow: 0 1px 2px rgba(0,0,0,0.5); }
        .pattern-tag { background: rgba(56, 189, 248, 0.1); border: 1px solid rgba(56, 189, 248, 0.2); color: #38bdf8; }
    </style>
</head>
<body class="p-4 min-h-screen">
    <div class="max-w-7xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6 mt-6">
            <div>
                <h1 class="text-3xl md:text-5xl font-extrabold tracking-tighter italic">BISHAL<span class="text-amber-500">RARE</span>.</h1>
                <p class="text-slate-500 text-sm">Automated Account Rarity Analyzer v2.0</p>
            </div>
            <div class="flex gap-4">
                <label class="bg-white text-black hover:bg-slate-200 px-6 py-3 rounded-full cursor-pointer font-bold transition flex items-center shadow-lg shadow-white/5">
                    <i class="fas fa-plus-circle mr-2 text-lg"></i> LOAD JSON
                    <input type="file" id="jsonInput" class="hidden" accept=".json">
                </label>
            </div>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="glass p-4 rounded-3xl text-center">
                <p class="text-xs text-slate-500 uppercase font-bold tracking-widest">Total Scanned</p>
                <h2 id="totalCount" class="text-2xl font-black">0</h2>
            </div>
            <div class="glass p-4 rounded-3xl text-center border-amber-500/20">
                <p class="text-xs text-amber-500 uppercase font-bold tracking-widest">Rare Detected</p>
                <h2 id="rareCount" class="text-2xl font-black text-amber-500">0</h2>
            </div>
            <div class="glass p-4 rounded-3xl text-center">
                <p class="text-xs text-slate-500 uppercase font-bold tracking-widest">Region</p>
                <h2 class="text-2xl font-black text-emerald-400">ID</h2>
            </div>
            <div class="glass p-4 rounded-3xl text-center">
                <p class="text-xs text-slate-500 uppercase font-bold tracking-widest">Status</p>
                <h2 class="text-2xl font-black text-blue-400">READY</h2>
            </div>
        </div>

        <div id="accountGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>

        <div id="emptyState" class="text-center py-32">
            <div class="inline-block p-8 rounded-full bg-slate-900/50 mb-4">
                <i class="fas fa-microchip text-5xl text-slate-700 animate-pulse"></i>
            </div>
            <p class="text-slate-400 font-medium">Waiting for data input, bjirr...</p>
        </div>
    </div>

    <script>
        let rawData = [];

        document.getElementById('jsonInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    rawData = JSON.parse(e.target.result);
                    const rareItems = rawData.filter(acc => acc.rarity_type === "RARE_ACCOUNT");
                    
                    document.getElementById('totalCount').innerText = rawData.length;
                    document.getElementById('rareCount').innerText = rareItems.length;
                    
                    renderData(rawData);
                    document.getElementById('emptyState').classList.add('hidden');
                } catch (err) {
                    alert('Format JSON kaco nih, cek lagi!');
                }
            };
            reader.readAsText(file);
        });

        function renderData(data) {
            const grid = document.getElementById('accountGrid');
            grid.innerHTML = '';

            data.forEach((acc) => {
                const isRare = acc.rarity_type === "RARE_ACCOUNT";
                const card = document.createElement('div');
                
                // Set Card Style based on Rarity
                card.className = `glass rounded-[2rem] p-6 relative overflow-hidden transition-all duration-300 hover:-translate-y-2 ${isRare ? 'rare-glow border-amber-500/40' : 'opacity-60 hover:opacity-100'}`;
                
                // Get Reason details
                let reasonClean = acc.reason || "Normal Account";
                let score = acc.rarity_score || 0;
                
                card.innerHTML = `
                    ${isRare ? `<div class="absolute -right-12 -top-12 w-32 h-32 bg-amber-500/10 blur-3xl rounded-full"></div>` : ''}
                    
                    <div class="flex justify-between items-center mb-6">
                        <span class="text-[10px] font-black px-3 py-1 rounded-full bg-slate-800 text-slate-400 uppercase tracking-widest">ID: ${acc.uid}</span>
                        ${isRare ? `<span class="badge-rare text-[10px] font-black px-3 py-1 rounded-full uppercase tracking-widest">SCORE: ${score}</span>` : ''}
                    </div>

                    <div class="mb-6">
                        <h3 class="text-2xl font-extrabold text-white mb-1 tracking-tight">${acc.name}</h3>
                        <div class="flex items-center gap-2">
                             <p class="text-amber-400 font-mono text-lg font-bold">${acc.account_id}</p>
                             <button onclick="copyToClipboard('${acc.account_id}')" class="text-slate-600 hover:text-white transition"><i class="fas fa-copy text-xs"></i></button>
                        </div>
                    </div>

                    <div class="space-y-4">
                        ${isRare ? `
                            <div class="p-4 rounded-2xl bg-black/40 border border-white/5">
                                <p class="text-[10px] text-slate-500 font-bold uppercase mb-2">Detection Intel:</p>
                                <p class="text-xs text-slate-300 leading-relaxed mb-3">${reasonClean}</p>
                                <div class="flex flex-wrap gap-2">
                                    <span class="pattern-tag text-[9px] px-2 py-1 rounded-md font-bold uppercase">PREMIUM_ID</span>
                                    <span class="pattern-tag text-[9px] px-2 py-1 rounded-md font-bold uppercase text-emerald-400 border-emerald-500/20 bg-emerald-500/5">VERIFIED</span>
                                </div>
                            </div>
                        ` : `
                            <p class="text-xs text-slate-600 italic">No special patterns detected in this account.</p>
                        `}

                        <div class="flex gap-2">
                            <button onclick="copyToClipboard('${acc.password}')" class="flex-1 bg-white text-black hover:bg-slate-200 py-3 rounded-2xl text-xs font-black transition uppercase tracking-widest">
                                Copy Password
                            </button>
                            <div class="w-12 h-12 glass rounded-2xl flex items-center justify-center text-emerald-500">
                                <i class="fas fa-globe-asia"></i>
                            </div>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text);
            // Simple alert replacement with a tiny toast if you want, for now use alert
            console.log('Copied:', text);
            // alert('Berhasil disalin: ' + text);
        }
    </script>
</body>
</html>
