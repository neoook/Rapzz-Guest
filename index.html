<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💎 BISHAL ELITE 5+ SCANNER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        body { font-family: 'Space Grotesk', sans-serif; background-color: #050505; color: #fff; scroll-behavior: smooth; }
        .glass { background: rgba(20, 20, 20, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); }
        .elite-card { 
            border-top: 2px solid #f59e0b;
            background: linear-gradient(180deg, rgba(245,158,11,0.1) 0%, rgba(5,5,5,1) 100%);
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }
        .glow-text { text-shadow: 0 0 10px rgba(245, 158, 11, 0.5); }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #f59e0b; border-radius: 10px; }
    </style>
</head>
<body class="p-6 md:p-12 min-h-screen">
    <div class="max-w-6xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-12 gap-6">
            <div class="text-center md:text-left">
                <h1 class="text-5xl font-black italic tracking-tighter text-amber-500 glow-text">ELITE<span class="text-white underline uppercase italic">Scanner</span></h1>
                <p class="text-slate-500 mt-2 font-medium tracking-[0.3em] text-[10px] uppercase">Filtering Scores 5-12+ Only</p>
            </div>
            
            <div class="flex flex-wrap justify-center gap-3">
                <button onclick="copySortedIds()" class="bg-amber-500 hover:bg-amber-400 text-black px-6 py-4 rounded-2xl font-black text-xs uppercase transition-all shadow-lg shadow-amber-500/20">
                    <i class="fas fa-list-ol mr-2"></i> Copy ID List (High to Low)
                </button>
                <label class="bg-white hover:bg-slate-200 text-black px-6 py-4 rounded-2xl font-black text-xs uppercase cursor-pointer transition-all shadow-xl">
                    <i class="fas fa-file-upload mr-2"></i> Load JSON
                    <input type="file" id="jsonInput" class="hidden" accept=".json">
                </label>
            </div>
        </div>

        <div id="statsBar" class="hidden grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">
            <div class="glass p-5 rounded-3xl text-center">
                <p class="text-slate-500 text-[9px] font-bold uppercase tracking-widest mb-1">Total Scanned</p>
                <h3 id="totalCount" class="text-2xl font-black italic text-white">0</h3>
            </div>
            <div class="glass p-5 rounded-3xl border-amber-500/30 text-center">
                <p class="text-amber-500 text-[9px] font-bold uppercase tracking-widest mb-1">Elite (5+) Found</p>
                <h3 id="rareCount" class="text-2xl font-black italic text-amber-500">0</h3>
            </div>
            <div class="glass p-5 rounded-3xl text-center">
                <p class="text-slate-500 text-[9px] font-bold uppercase tracking-widest mb-1">Max Score</p>
                <h3 id="maxScore" class="text-2xl font-black italic text-emerald-400">0</h3>
            </div>
            <div class="glass p-5 rounded-3xl text-center">
                <p class="text-slate-500 text-[9px] font-bold uppercase tracking-widest mb-1">Scanner</p>
                <h3 class="text-2xl font-black italic text-blue-400">ACTIVE</h3>
            </div>
        </div>

        <textarea id="tempIdBox" class="hidden"></textarea>

        <div id="accountGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

        <div id="placeholder" class="text-center py-48 opacity-10">
            <i class="fas fa-gem text-9xl mb-6"></i>
            <h2 class="text-xl font-bold uppercase tracking-[1.5em]">Elite Only</h2>
        </div>
    </div>

    <script>
        let eliteData = [];

        const ACCOUNT_RARITY_PATTERNS = {
            "REPEATED_DIGITS_4": [/(\d)\1{3,}/, 3],
            "REPEATED_DIGITS_3": [/(\d)\1\1(\d)\2\2/, 2],
            "SEQUENTIAL_5": [/(12345|23456|34567|45678|56789)/, 4],
            "SEQUENTIAL_4": [/(0123|1234|2345|3456|4567|5678|6789|9876|8765|7654|6543|5432|4321|3210)/, 3],
            "PALINDROME_6": [/^(\d)(\d)(\d)\3\2\1$/, 5],
            "PALINDROME_4": [/^(\d)(\d)\2\1$/, 3],
            "SPECIAL_COMBINATIONS_HIGH": [/(69|420|1337|007)/, 4],
            "SPECIAL_COMBINATIONS_MED": [/(100|200|300|400|500|666|777|888|999)/, 2],
            "QUADRUPLE_DIGITS": [/(1111|2222|3333|4444|5555|6666|7777|8888|9999|0000)/, 4],
            "GOLDEN_RATIO": [/1618|0618/, 3]
        };

        document.getElementById('jsonInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                const data = JSON.parse(e.target.result);
                processEliteData(data);
            };
            reader.readAsText(file);
        });

        function checkAccountRarity(accId) {
            if (!accId || accId === "N/A") return { isRare: false };
            let rarityScore = 0;
            let detectedPatterns = [];

            for (let [type, data] of Object.entries(ACCOUNT_RARITY_PATTERNS)) {
                if (data[0].test(accId)) {
                    rarityScore += data[1];
                    detectedPatterns.push(type);
                }
            }

            const digits = accId.split('').filter(d => !isNaN(d)).map(Number);
            const uniqueDigits = new Set(digits);
            if (uniqueDigits.size === 1 && digits.length >= 4) {
                rarityScore += 5;
                detectedPatterns.push("UNIFORM_DIGITS");
            }

            if (digits.length >= 4) {
                let diffs = [];
                for (let i = 0; i < digits.length - 1; i++) {
                    diffs.push(digits[i+1] - digits[i]);
                }
                if (new Set(diffs).size === 1) {
                    rarityScore += 4;
                    detectedPatterns.push("ARITHMETIC_SEQUENCE");
                }
            }

            if (accId.length <= 8 && !isNaN(accId) && parseInt(accId) < 1000000) {
                rarityScore += 3;
                detectedPatterns.push("LOW_ACCOUNT_ID");
            }

            // FILTER KHUSUS SCORE 5+ (Sesuai Request)
            if (rarityScore >= 5) {
                return {
                    isElite: true,
                    score: rarityScore,
                    reason: `ID ${accId} - Score: ${rarityScore} - [${detectedPatterns.join(', ')}]`
                };
            }
            return { isElite: false };
        }

        function processEliteData(data) {
            const grid = document.getElementById('accountGrid');
            const statsBar = document.getElementById('statsBar');
            document.getElementById('placeholder').classList.add('hidden');
            statsBar.classList.remove('hidden');
            
            grid.innerHTML = '';
            eliteData = [];
            let maxS = 0;

            data.forEach(acc => {
                const res = checkAccountRarity(acc.account_id);
                if (res.isElite) {
                    const eliteAcc = { ...acc, elite_score: res.score, elite_reason: res.reason };
                    eliteData.push(eliteAcc);
                    if (res.score > maxS) maxS = res.score;
                }
            });

            // SORTING DARI SCORE TINGGI KE RENDAH
            eliteData.sort((a, b) => b.elite_score - a.elite_score);

            eliteData.forEach(acc => {
                const card = document.createElement('div');
                card.className = "glass p-6 rounded-[2rem] elite-card relative transition-all hover:scale-[1.03]";
                card.innerHTML = `
                    <div class="flex justify-between mb-4">
                        <span class="text-[9px] font-black text-amber-500 uppercase tracking-widest">Elite Member</span>
                        <span class="bg-amber-500 text-black text-[10px] font-black px-2 py-0.5 rounded italic">SCORE ${acc.elite_score}</span>
                    </div>
                    <h3 class="text-xl font-black text-white mb-1 tracking-tight truncate">${acc.name}</h3>
                    <p class="text-amber-400 font-mono text-lg font-bold mb-4">${acc.account_id}</p>
                    <div class="bg-black/50 p-3 rounded-xl border border-white/5 mb-4">
                        <p class="text-[10px] text-slate-400 font-mono leading-tight">${acc.elite_reason}</p>
                    </div>
                    <button onclick="copyClip('${acc.password}')" class="w-full bg-white text-black py-3 rounded-xl font-black text-[10px] uppercase hover:bg-amber-500 transition-colors">
                        Copy Password
                    </button>
                `;
                grid.appendChild(card);
            });

            document.getElementById('totalCount').innerText = data.length;
            document.getElementById('rareCount').innerText = eliteData.length;
            document.getElementById('maxScore').innerText = maxS;
        }

        function copySortedIds() {
            if (eliteData.length === 0) return alert('Upload JSON dulu bjirr!');
            
            // Format ID saja, High to Low (Sudah di-sort di fungsi process)
            const idList = eliteData.map(acc => acc.account_id).join('\n');
            navigator.clipboard.writeText(idList);
            
            // Alert visual
            const btn = event.currentTarget;
            const originalText = btn.innerHTML;
            btn.innerHTML = "<i class='fas fa-check mr-2'></i> ID List Copied!";
            btn.classList.replace('bg-amber-500', 'bg-emerald-500');
            
            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.classList.replace('bg-emerald-500', 'bg-amber-500');
            }, 2000);
        }

        function copyClip(text) {
            navigator.clipboard.writeText(text);
        }
    </script>
</body>
</html>
