name: SR KING ULTIMATE DEPLOYER

on:
  workflow_dispatch: # Biar bisa klik "Run Workflow" manual
  schedule:
    - cron: '0 */6 * * *' # Jalan otomatis tiap 6 jam

permissions:
  contents: write

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📂 Checkout Repository
        uses: actions/checkout@v3

      - name: 🐍 Setup Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 🧅 Install Tor & System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tor
          # Jalankan layanan Tor di background
          sudo service tor start
          echo "✅ Tor service started on port 9050"

      - name: 📦 Install Python Libraries
        run: |
          python -m pip install --upgrade pip
          # Pysocks wajib ada buat koneksi socks5h://
          pip install pyTelegramBotAPI pycryptodome requests urllib3 psutil pysocks

      - name: 🚀 Run SR KING BOT
        env:
          # Menyambungkan GitHub Secrets ke environment variable
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          # Tunggu 15 detik biar Tor bener-bener "Ready" sebelum script jalan
          sleep 15
          # Timeout 5 jam (18000s) supaya gak kena kill paksa sama GitHub (limit 6 jam)
          timeout 18000s python bot.py || echo "⚠️ Selesai atau Limit Waktu Tercapai"

      - name: 💾 Auto Save & Push Results
        if: always() # Tetap jalan meskipun script bot-nya timeout
        run: |
          git config --local user.email "bot@srking.com"
          git config --local user.name "SR-KING-DEPLOYER"
          git add .
          # Hanya commit kalau ada file .txt baru (hasil generate)
          git commit -m "Update: Hasil Generate $(date)" || echo "No changes to commit"
          git push
