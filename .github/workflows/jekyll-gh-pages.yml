name: BISHAL WEB DASHBOARD

on:
  workflow_dispatch: # Klik "Run Workflow" di tab Actions
  schedule:
    - cron: '0 */6 * * *' # Auto-run tiap 6 jam

permissions:
  contents: write

jobs:
  run-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install requests pycryptodome pyTelegramBotAPI urllib3 psutil

      - name: Run Generator Bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          # Jalanin bot lo (timeout biar gak stuck selamanya)
          timeout 18000s python bot.py || echo "Selesai/Timeout"

      - name: Create Web Dashboard (index.html)
        run: |
          # Ini bagian buat bikin UI Bagus otomatis tanpa lo bikin file index.html
          cat <<EOF > index.html
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>BISHAL  ERA DASHBOARD</title>
              <script src="https://cdn.tailwindcss.com"></script>
              <style>
                  body { background: radial-gradient(circle, #1a1a1a 0%, #000 100%); color: #00ff00; }
                  .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(0,255,0,0.2); }
                  .glow { text-shadow: 0 0 10px #00ff00; }
              </style>
          </head>
          <body class="min-h-screen p-8 font-mono">
              <div class="max-w-4xl mx-auto">
                  <header class="text-center mb-12">
                      <h1 class="text-5xl font-bold glow mb-2">𝐁𝐑𝐄𝐗𝐗𝐄𝐑𝐀</h1>
                      <p class="text-gray-400 italic">"Premium Account Generator Dashboard"</p>
                      <div class="mt-4 text-xs text-green-500 opacity-50">Last Update: $(date)</div>
                  </header>

                  <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                      <div class="glass p-6 rounded-2xl shadow-2xl">
                          <h2 class="text-xl font-bold mb-4 border-b border-green-900 pb-2">📊 Statistics</h2>
                          <p class="mb-2">Status: <span class="text-white bg-green-900 px-2 rounded">ONLINE</span></p>
                          <p class="mb-2">System: <span class="text-white">GitHub Actions v3</span></p>
                          <p>Region Support: <span class="text-white">IND, ME, VN, BR, CIS, BD</span></p>
                      </div>

                      <div class="glass p-6 rounded-2xl shadow-2xl">
                          <h2 class="text-xl font-bold mb-4 border-b border-green-900 pb-2">📁 Quick Access</h2>
                          <div class="flex flex-col space-y-3">
                              <a href="./𝐁𝐑𝐄𝐗𝐗𝐄𝐑𝐀/𝐀𝐂𝐂𝐎𝐔𝐍𝐓𝐒/" class="hover:text-white transition">📂 Browse All Accounts</a>
                              <a href="./𝐁𝐑𝐄𝐗𝐗𝐄𝐑𝐀/𝐑𝐀𝐑𝐄𝐀𝐂𝐂𝐎𝐔𝐍𝐓𝐒/" class="hover:text-white transition">💎 Rare Accounts Folder</a>
                              <a href="./𝐁𝐑𝐄𝐗𝐗𝐄𝐑𝐀/𝐆𝐇𝐎𝐒𝐓/" class="hover:text-white transition">👻 Ghost Mode Files</a>
                          </div>
                      </div>
                  </div>

                  <div class="mt-12 glass p-8 rounded-2xl overflow-hidden">
                      <h2 class="text-2xl font-bold mb-4 text-center">💻 Generated Assets</h2>
                      <p class="text-sm text-center text-gray-500 mb-6 italic">Semua file disimpan dalam format .json untuk keamanan data.</p>
                      <div class="bg-black/50 p-4 rounded-lg border border-green-900/50">
                          <code class="text-xs text-green-400">
                             // Info: Akses file langsung via URL repo lo <br>
                             // Contoh: /𝐁𝐑𝐄𝐗𝐗𝐄𝐑𝐀/𝐀.../accounts-IND.json
                          </code>
                      </div>
                  </div>

                  <footer class="mt-20 text-center text-gray-600 text-[10px]">
                      &copy; 2026 BISHAL PREDICTOR | BY SPIDEERIO | NOT FOR SALE
                  </footer>
              </div>
          </body>
          </html>
          EOF

      - name: Save and Push to Repo
        run: |
          git config --local user.email "bot@github.com"
          git config --local user.name "Bishal-Web-Deployer"
          git add .
          git commit -m "Update Dashboard & Accounts: $(date)" || echo "No changes"
          git push
